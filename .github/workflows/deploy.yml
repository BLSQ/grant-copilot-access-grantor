name: Build and Push to ECR

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  
  build-and-push:
    name: Build and Push
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      id-token: write
      contents: read
    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set variables
        id: vars
        run: |
          # Use 7-char commit SHA as image tag
          IMAGE_TAG=$(git rev-parse --short=7 HEAD)
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "Image tag: ${IMAGE_TAG}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ACCESS_GRANTOR_ECR_REPOSITORY }}:${{ steps.vars.outputs.image_tag }}
            ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ACCESS_GRANTOR_ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "## Docker Image Built" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Image Tag** | \`${{ steps.vars.outputs.image_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "### To Deploy" >> $GITHUB_STEP_SUMMARY
          echo "Go to [grant-copilot-infra](https://github.com/BLSQ/grant-copilot-infra/actions) and run the deploy workflow with:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "image_tag: ${{ steps.vars.outputs.image_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  tag-dev:
    name: Tag Dev
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      id-token: write
      contents: read
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tag image with dev
        id: tag
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: ${{ secrets.ACCESS_GRANTOR_ECR_REPOSITORY }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          MANIFEST=$(aws ecr batch-get-image \
            --repository-name "$REPOSITORY" \
            --image-ids imageTag="$IMAGE_TAG" \
            --query 'images[0].imageManifest' \
            --output text)

          if ! OUTPUT=$(aws ecr put-image \
            --repository-name "$REPOSITORY" \
            --image-tag ${{ secrets.IMAGE_TAG }} \
            --image-manifest "$MANIFEST" 2>&1); then
            if echo "$OUTPUT" | grep -q "ImageAlreadyExistsException"; then
              echo "Tag already points to this image, skipping."
            else
              echo "::error::Failed to tag image: $OUTPUT"
              exit 1
            fi
          fi

          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

  tag-qa:
    name: Tag QA
    needs: tag-dev
    runs-on: ubuntu-latest
    environment: qa
    permissions:
      id-token: write
      contents: read
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tag image with qa
        id: tag
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: ${{ secrets.ACCESS_GRANTOR_ECR_REPOSITORY }}
          IMAGE_TAG: ${{ needs.tag-dev.outputs.image_tag }}
        run: |
          MANIFEST=$(aws ecr batch-get-image \
            --repository-name "$REPOSITORY" \
            --image-ids imageTag="$IMAGE_TAG" \
            --query 'images[0].imageManifest' \
            --output text)

          if ! OUTPUT=$(aws ecr put-image \
            --repository-name "$REPOSITORY" \
            --image-tag ${{ secrets.IMAGE_TAG }} \
            --image-manifest "$MANIFEST" 2>&1); then
            if echo "$OUTPUT" | grep -q "ImageAlreadyExistsException"; then
              echo "Tag already points to this image, skipping."
            else
              echo "::error::Failed to tag image: $OUTPUT"
              exit 1
            fi
          fi

          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

  tag-uat:
    name: Tag UAT
    needs: tag-qa
    runs-on: ubuntu-latest
    environment: uat
    permissions:
      id-token: write
      contents: read
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tag image with UAT
        id: tag
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: ${{ secrets.ACCESS_GRANTOR_ECR_REPOSITORY }}
          IMAGE_TAG: ${{ needs.tag-qa.outputs.image_tag }}
        run: |
          MANIFEST=$(aws ecr batch-get-image \
            --repository-name "$REPOSITORY" \
            --image-ids imageTag="$IMAGE_TAG" \
            --query 'images[0].imageManifest' \
            --output text)

          if ! OUTPUT=$(aws ecr put-image \
            --repository-name "$REPOSITORY" \
            --image-tag ${{ secrets.IMAGE_TAG }} \
            --image-manifest "$MANIFEST" 2>&1); then
            if echo "$OUTPUT" | grep -q "ImageAlreadyExistsException"; then
              echo "Tag already points to this image, skipping."
            else
              echo "::error::Failed to tag image: $OUTPUT"
              exit 1
            fi
          fi

          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
